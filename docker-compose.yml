services:
  backend:
    build: ./backend
    container_name: creditsetu-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/creditsetu.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - DEFAULT_SEED=42
      - N_CUSTOMERS=1000
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  frontend:
    build: ./frontend
    container_name: creditsetu-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
